name: Distributed Matrix Render Farm

on:
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------
  # THE WORKERS: 5 Servers running at the same time
  # ---------------------------------------------------------
  render_chunks:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        phase: [Phase1, Phase2, Phase3, Phase4, Phase5]
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev pkg-config

    - name: Install Manim
      run: pip install manim

    - name: Render High-Quality Chunk
      run: manim -qh main.py ${{ matrix.phase }}

    - name: Rename Output File
      run: mv media/videos/main/1080p60/${{ matrix.phase }}.mp4 ./chunk_${{ matrix.phase }}.mp4

    - name: Upload Chunk to Temporary Storage
      uses: actions/upload-artifact@v4
      with:
        name: chunk-${{ matrix.phase }}
        path: chunk_${{ matrix.phase }}.mp4
        retention-days: 1

  # ---------------------------------------------------------
  # THE ASSEMBLER: 1 Server that wakes up when the others finish
  # ---------------------------------------------------------
  assemble_video:
    needs: render_chunks
    runs-on: ubuntu-latest
    
    steps:
    - name: Download all 5 Chunks
      uses: actions/download-artifact@v4
      with:
        pattern: chunk-*
        merge-multiple: true

    - name: Install FFmpeg
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg

    - name: Seamlessly Stitch Video
      run: |
        echo "file 'chunk_Phase1.mp4'" > list.txt
        echo "file 'chunk_Phase2.mp4'" >> list.txt
        echo "file 'chunk_Phase3.mp4'" >> list.txt
        echo "file 'chunk_Phase4.mp4'" >> list.txt
        echo "file 'chunk_Phase5.mp4'" >> list.txt
        
        # -c copy stitches the raw video data instantly without re-encoding
        ffmpeg -f concat -safe 0 -i list.txt -c copy final_masterpiece.mp4

    - name: Deliver Final 5-Minute Video
      uses: actions/upload-artifact@v4
      with:
        name: final-masterpiece
        path: final_masterpiece.mp4
        retention-days: 7
