name: Generate Psychology Short

on:
  workflow_dispatch:

jobs:
  create_video:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev pkg-config fonts-liberation

    - name: Install Python Libraries
      run: |
        pip install manim

    - name: Run the Video Engine (Medium Quality for Speed)
      run: manim -qm main.py SpotlightIllusion

    - name: Rename Output File
      run: mv media/videos/main/720p30/SpotlightIllusion.mp4 ./final_video.mp4

    - name: Upload Final Video Artifact
      uses: actions/upload-artifact@v4
      with:
        name: spotlight-illusion-short
        path: final_video.mp4
        retention-days: 7
