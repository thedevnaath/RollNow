name: Kinetic Typography Generator

on:
  workflow_dispatch:  # Allows manual button press from mobile

jobs:
  generate_and_render:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev pkg-config fonts-liberation

    - name: Install Python Libraries
      run: |
        pip install -r requirements.txt

    - name: 🎥 Video Engine - Render Kinetic Typography
      run: manim -qh main.py KineticTypography

    - name: Rename Output File
      run: |
        VIDEO_PATH=$(find media/videos -type f -name "*.mp4" | head -n 1)
        mv "$VIDEO_PATH" ./final_kinetic_video.mp4

    - name: Upload Final Masterpiece
      uses: actions/upload-artifact@v4
      with:
        name: kinetic-typography-video
        path: final_kinetic_video.mp4
        retention-days: 7
