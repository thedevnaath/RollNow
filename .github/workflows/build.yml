name: Daily Autonomous Content Factory

on:
  workflow_dispatch:  # Allows manual button press
  schedule:
    - cron: '0 14 * * *'  # Runs automatically at 14:00 UTC every single day

jobs:
  generate_and_render:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev pkg-config fonts-liberation

    - name: Install Python Libraries
      run: |
        pip install -r requirements.txt

    - name: 🧠 AI Brain - Write the Script
      env:
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: python generate.py

    - name: 🎥 Video Engine - Render the UI (High Quality)
      run: manim -qh main.py DailyShort

    - name: Rename Output File
      run: |
        VIDEO_PATH=$(find media/videos -type f -name "*.mp4" | head -n 1)
        mv "$VIDEO_PATH" ./daily_short.mp4

    - name: Upload Final Masterpiece
      uses: actions/upload-artifact@v4
      with:
        name: daily-psychology-short
        path: daily_short.mp4
        retention-days: 7
