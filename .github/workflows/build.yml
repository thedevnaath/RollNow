name: Generate Vector Animation Short

on:
  workflow_dispatch:

jobs:
  create_video:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ffmpeg libcairo2-dev libpango1.0-dev pkg-config fonts-liberation

    - name: Install Python Libraries
      run: |
        pip install -r requirements.txt

    - name: Run the Video Engine
      run: python main.py

    - name: Upload Final Video Artifact
      uses: actions/upload-artifact@v4
      with:
        name: psychology-short
        path: final_video.mp4
        retention-days: 7
